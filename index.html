<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSG CRUZ | US Army Recruiting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="card" aria-label="Recruiter Profile Card">
        <header class="header">
            <img src="images/1.jpg" alt="Staff Sergeant Cruz in uniform" class="profile-img">
            <h1>SSG CRUZ</h1>
            <div class="rank" aria-label="Rank Title">U.S. ARMY RECRUITER</div>
        </header>
        <div class="content">
            <a href="tel:3602986031" class="contact-btn" aria-label="Call SSG Cruz at 360-298-6031">Call: (360) 298-6031</a>
            <button id="openModalBtn" class="contact-btn" style="background: var(--army-gold); color: black;">Request Information</button>
        </div>
    </main>

    <footer class="site-footer">
        <address class="footer-address">
            <strong>Burlington Recruiting Station</strong><br>
            623 S BURLINGTON BLVD. STE 601<br>
            BURLINGTON, WA 98233
        </address>

        <div class="footer-links"> 
            <a href="https://www.goarmy.com" target="_blank" rel="noopener">Want to learn more? | GoArmy.com</a>
        </div>
        
        <p class="copyright-text">&copy; 2026 U.S. Army Recruiting. All rights reserved.</p>
    </footer>

    <div id="applyModal" role="dialog" aria-labelledby="modal-title" aria-modal="true" hidden>
        <div class="modal-content">
            <h2 id="modal-title">Contact SSG CRUZ</h2>
            <form id="hookForm" autocomplete="on">
                <input type="text" name="b_name" class="hp-field" id="honeypot" tabindex="-1" autocomplete="off" aria-hidden="true">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe" autocomplete="name">
                </div>
                
                <div class="form-row">
                    <div class="form-group form-group-small">
                        <label for="age">Age</label>
                        <input type="number" id="age" required min="17" max="40">
                    </div>
                    <div class="form-group form-group-large">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" required placeholder="(360) 555-5555" autocomplete="tel">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="jobType">Interested Job Type</label>
                    <select id="jobType">
                        <option value="Combat">Combat (Infantry, Armor, etc.)</option>
                        <option value="Medical">Medical / Healthcare</option>
                        <option value="Tech">Technology / Cyber</option>
                        <option value="Engineering">Engineering / Logistics</option>
                        <option value="Other">I'm Not Sure Yet</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="contactMethod">How can we help?</label>
                    <select id="contactMethod">
                        <option value="phone">Schedule Phone Call</option>
                        <option value="f2f">Schedule Face to Face</option>
                        <option value="question">Ask Questions</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <textarea id="note" rows="2" placeholder="Briefly describe your goals..."></textarea>
                </div>

                <div class="captcha-container">
                    <span id="captcha-question">Loading...</span>
                    <input type="number" id="captcha-input" required aria-label="Captcha Answer">
                </div>
                
                <button type="submit" id="submitBtn" class="contact-btn">Submit Information</button>
                <button type="button" id="closeModalBtn" class="cancel-link">Cancel</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
